    html { height: -webkit-fill-available; }

      flex-direction: column;

    html, body { overscroll-behavior-y: contain; }

    #root { transition: filter 0.2s; }
    #root.dc-light {
      filter: invert(1) hue-rotate(180deg) saturate(0.9) brightness(1.05);
    }
    #root.dc-light video,
    #root.dc-light img,
    #root.dc-light canvas { filter: invert(1) hue-rotate(180deg); }

function calcStreak(sessions, userId) {
  const days = new Set(sessions.filter(s => s.studentId === userId).map(s => s.startedAt.slice(0, 10)));
  const toStr = d => d.toISOString().slice(0, 10);
  const today = new Date();
  const todayStr = toStr(today);
  const yestStr = toStr(new Date(+today - 86400000));
  const practicedToday = days.has(todayStr);
  // 오늘 또는 어제부터 거슬러 올라가기
  let start = practicedToday ? todayStr : days.has(yestStr) ? yestStr : null;
  if (!start) return {
    streak: 0,
    practicedToday: false
  };
  let streak = 0,
    cur = new Date(start);
  while (days.has(toStr(cur))) {
    streak++;
    cur = new Date(+cur - 86400000);
  }
  return {
    streak,
    practicedToday
  };
}
